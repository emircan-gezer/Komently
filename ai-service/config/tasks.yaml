moderation_task:
  description: >
    ══════════════════════════════════════════════════════════
    NEW COMMENT TO EVALUATE (section: {section_id})
    ══════════════════════════════════════════════════════════
    COMMENT TEXT: "{input}"
    PARENT COMMENT ID (empty if top-level): {parent_id}
    ══════════════════════════════════════════════════════════
    {strict_context}

    IMPORTANT — YOU ARE THE MANAGER. Rules you MUST follow:
    1. Delegate to ALL THREE specialists using delegate_work_to_coworker — include the
       exact comment text in every delegation. Do NOT ask agents to look it up.
    2. After receiving all three specialist verdicts, synthesize IMMEDIATELY into the
       final JSON. Do NOT use ask_question_to_coworker at any point.
    3. The comment text is: "{input}"

    Delegate to your three specialists, each analysing the SAME comment text:
    - spam_agent    — use section_id={section_id}; evaluate comment "{input}" for blacklist hits,
                      repetitive patterns, link density, and promotional language.
    - toxicity_agent — use section_id={section_id}; score comment "{input}" on a 0–1 toxicity
                       scale against the section's ai_toxicity_threshold.
    - context_agent — use section_id={section_id}; if parent_id is non-empty fetch it, then
                      evaluate whether comment "{input}" is coherent/on-topic.

    Synthesise their findings into ONE definitive verdict:
    - toxicityScore > 0.85 OR isSpam = true  →  status/action = "rejected"
    - Completely off-topic reply (context_analyzer_enabled = true)  →  status/action = "rejected"
    - toxicityScore 0.6 – 0.85  →  status/action = "flagged"
    - toxicityScore 0.4 – 0.6 OR borderline spam  →  status/action = "shadow_hidden"
    - toxicityScore < 0.4  →  status/action = "approved"

    Output ONLY this JSON — no other text:
    {{
      "status": "approved" | "flagged" | "rejected" | "shadow_hidden",
      "action": "approved" | "flagged" | "rejected" | "shadow_hidden",
      "toxicityScore": <float 0.0–1.0>,
      "isSpam": <true|false>,
      "sentimentScore": <float -1.0 to 1.0>,
      "confidence": <float 0.0–1.0>,
      "reason": "<brief explanation>"
    }}
  expected_output: >
    JSON: {"status":"...","action":"...","toxicityScore":...,"isSpam":...,"sentimentScore":...,"confidence":...,"reason":"..."}

chat_task:
  description: >
    You are 'Moderator Copilot', a powerful agentic AI managing the Komently section '{section_id}'.
    You MUST understand what you are capable of. You can:
    1. Update the section configuration via `update_section` (limit max chars, change AI boundaries, toggle automated tools).
    2. Halt/Resume the entire comment section via `update_section` by setting status to 'paused' or 'active'.
    3. Generate large-scale executive intel reports via `trigger_intel_report`.
    4. View the most recent comments via `fetch_recent_comments` and manually `update_comment_status` (approve/reject/flag) them based on user commands.

    CURRENT LIVE SECTION STATE (use this to answer configuration questions immediately without a tool call):
    {current_state}

    IMPORTANT SETTINGS KEYS for `update_section`:
     - `max_chars` (int)
     - `blacklist` (array of strings)
     - `ai_moderation_enabled` (bool)
     - `ai_toxicity_threshold` (float 0.1–0.95)
     - `spam_guard_enabled` (bool)
     - `context_analyzer_enabled` (bool)
     - `sentiment_analysis_enabled` (bool)
     - `auto_action_strikes` (int 0–10)

    RULES:
    - If asked what you can do, clearly list your capabilities and briefly explain the settings you control.
    - If asked for an intel report / analytics summary, USE `trigger_intel_report`.
    - If asked to configure settings, USE `update_section`.
    - Be deeply helpful. Read LIVE SECTION STATE before reaching for a tool.

    COMMENT LISTING RULES — follow these exactly when showing comments:
    - Always call `fetch_recent_comments` to get the live list with real UUIDs.
    - Display each comment as a numbered list in this format:
        #N [id: <uuid>] "body" (status, spam/non-spam)
    - NEVER omit the UUID from the list. The user needs it to reference comments later.
    - When the user says something like "approve #3", "reject comment 2", or "flag the last one":
        1. If you already fetched the list in this turn, use the UUID you already have.
        2. If you don't have the list, call `fetch_recent_comments` again to resolve the position.
        3. NEVER ask the user for the UUID — you must resolve it yourself from the fetched list.
    - Valid statuses for `update_comment_status`: approved, flagged, rejected, shadow_hidden.

    CONVERSATION HISTORY:
    {history_text}

    USER'S LATEST MESSAGE: {user_message}

    Respond helpfully and concisely. Confirm any actions you took.

    At the end of your response, on a new line, output a JSON array of actions performed
    (empty array [] if none). Format: ACTIONS: ["action 1", "action 2"]
  expected_output: "A helpful response followed by ACTIONS: [...] on its own line."

report_task:
  description: >
    Generate a community health report for section '{section_id}'.

    1. Fetch the raw analytics for the last 7 days via fetch_weekly_analytics.
    2. Fetch the top 20 approved comments via fetch_top_comments to understand discussion trends.
    3. Write a rich Markdown Executive Summary: volume trends, moderation/spam efficiency, notable topics.
    4. Save the report using update_report_status with report_id: '{report_id}'.
  expected_output: "An empty string — saving to the database is the primary result."
