fetch_task:
  description: >
    Fetch the section settings and the 10 most recent comments
    for section_id '{section_id}'.
    {parent_context}
    Return all raw data correctly.
  expected_output: "JSON containing section settings and recent comments."

manage_task:
  description: >
    Using the section settings retrieved by the Data Retrieval Specialist,
    create a strict, numbered moderation rulebook in plain English. Include
    the toxicity threshold (`ai_toxicity_threshold`), character limits, and blacklisted words.
    Crucially, if the settings enable `spam_guard_enabled`, add strict heuristics against promotional or bot-like messages.
    If `context_analyzer_enabled` is active and there is a parent comment, add a strict rule requiring replies to stay relevant to the topic.
    If `sentiment_analysis_enabled` is active, instruct the moderator to output an accurate sentiment score.
  expected_output: "A numbered plain-English moderation rulebook."

moderate_task:
  description: >
    Evaluate the following comment against the moderation rulebook:

    ---
    {comment_body}
    ---

    Decide on an action and status based on these thresholds:
    - toxicityScore > 0.85 OR isSpam is true: action='rejected', status='rejected'
    - Context Analyzer violation (completely off-topic reply): action='rejected', status='rejected'
    - toxicityScore between 0.6 and 0.85: action='flagged', status='flagged'
    - toxicityScore between 0.4 and 0.6 OR borderline spammy: action='shadow_hidden', status='shadow_hidden'
    - toxicityScore < 0.4: action='approved', status='approved'

    Output ONLY a JSON object with these exact keys:
      "status": "approved", "flagged", "rejected", or "shadow_hidden",
      "action": "approved", "flagged", "rejected", or "shadow_hidden",
      "toxicityScore": float 0.0-1.0,
      "isSpam": true or false,
      "sentimentScore": float ranging from -1.0 (very negative) to 1.0 (very positive),
      "reason": brief explanation string
    Do NOT add any text outside the JSON.
  expected_output: 'JSON object: {"status":"...","action":"...","toxicityScore":...,"isSpam":...,"reason":"..."}'

chat_task:
  description: >
    You are 'Moderator Copilot', a powerful agentic AI managing the Komently section '{section_id}'.
    You MUST understand what you are capable of. You can:
    1. Update the section configuration via `update_section` (limit max chars, change AI boundaries, toggle automated tools).
    2. Halt/Resume the entire comment section via `update_section` by setting status to 'paused' or 'active'.
    3. Generate large-scale executive intel reports via `trigger_intel_report`.
    4. View the most recent comments via `fetch_recent_comments` and manually `update_comment_status` (approve/reject/flag) them based on user commands.

    CURRENT LIVE SECTION STATE (Use this to answer questions about the current configuration immediately):
    {current_state}

    IMPORTANT SETTINGS KEYS for `update_section`:
     - `max_chars` (int)
     - `blacklist` (array of strings)
     - `ai_moderation_enabled` (bool)
     - `ai_toxicity_threshold` (float 0.1-0.95)
     - `spam_guard_enabled` (bool)
     - `context_analyzer_enabled` (bool)
     - `sentiment_analysis_enabled` (bool)
     - `auto_action_strikes` (int 0-10)

    RULES FOR YOUR RESPONSES:
    - If asked what you can do, proudly and clearly list your capabilities and briefly explain the various Spam, Context, and Analytics settings you control.
    - If asked to create an intel report / analytics summary, USE `trigger_intel_report`.
    - If asked to configure settings, USE `update_section`.
    - Be deeply helpful. If someone asks 'What is my spam setting?', read the LIVE SECTION STATE to answer accurately without needing a tool call.

    CONVERSATION HISTORY:{history_text}

    USER'S LATEST MESSAGE: {user_message}

    Respond helpfully and concisely. If you act, confirm what you did.

    At the end of your response, on a new line, output a JSON array of
    action descriptions you performed (empty array [] if no actions taken).
    Format: ACTIONS: ["action 1", "action 2"]
  expected_output: "A helpful response followed by ACTIONS: [...] on its own line."

report_task:
  description: >
    You have been requested to evaluate community health for section '{section_id}'.

    1. Fetch the raw SQL analytics for the last 7 days.
    2. Fetch the top 20 approved comments to understand what people are discussing.
    3. Write a rich Markdown Executive Summary focusing on volume trends, moderation/spam efficiency, and notable conversation topics.
    4. Finally, use your UpdateReportStatusTool to securely save the generated Markdown string into the database under report_id: '{report_id}'.
  expected_output: "An empty string (saving to the database is the primary expected result)."
